[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  ".git",
  ".pytest_cache",
  "__pycache__",
  "release",
  "release_ci*",
]

[tool.ruff.lint]
select = ["F", "E9", "I", "UP", "B", "SIM", "C4"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
no_implicit_optional = true
check_untyped_defs = true
incremental = false
exclude = '(^|[\\/])(\.git|\.venv|\.pytest_cache|__pycache__|release|release_ci[^\\/]*|uploads|repo|tests[\\/]_tmp_pytest)([\\/]|$)'
files = [
  "app_main.py",
  "core_metadata.py",
  "core_processor.py",
  "ui_state.py",
  "ui_common.py",
  "ui_home.py",
  "ui_labels.py",
  "ui_upload.py",
  "ui_review.py",
  "ui_execute.py",
  "ui_search.py",
  "ui_renderers.py",
  "ui_records.py",
  "frontend_safety.py",
  "logging_config.py",
  "report_exports.py",
  "folder_models.py",
  "folder_organizer.py",
  "folder_service.py",
  "folder_report.py",
  "services_analysis.py",
  "services_finalize.py",
  "storage_repository.py",
  "storage_recovery.py",
  "storage_search.py",
  "scripts/create_release_zip.py",
  "scripts/check_workspace_clean.py",
]

