[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
  ".git",
  ".pytest_cache",
  "__pycache__",
  "release",
  "release_ci*",
]

[tool.ruff.lint]
select = ["F", "E9", "I", "UP", "B", "SIM", "C4"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
no_implicit_optional = true
check_untyped_defs = true
incremental = false
exclude = '(^|[\\/])(\.git|\.venv|\.pytest_cache|__pycache__|release|release_ci[^\\/]*|uploads|repo|tests([\\/]_tmp_pytest)?)([\\/]|$)'
files = [
  "app.py",
  "app_main.py",
  "async_processor.py",
  "config.py",
  "contracts.py",
  "core.py",
  "core_classification.py",
  "core_metadata.py",
  "core_processor.py",
  "core_utils.py",
  "processors/__init__.py",
  "processors/dependency_status.py",
  "processors/image_processor.py",
  "processors/llm_summary.py",
  "processors/metadata_contract.py",
  "processors/optional_deps.py",
  "processors/pdf_processor.py",
  "processors/video_processor.py",
  "folder_models.py",
  "folder_organizer.py",
  "folder_service.py",
  "folder_report.py",
  "frontend_safety.py",
  "logging_config.py",
  "report_exports.py",
  "services.py",
  "services_models.py",
  "services_analysis.py",
  "services_review.py",
  "services_finalize.py",
  "storage.py",
  "storage_base.py",
  "storage_schema.py",
  "storage_repository.py",
  "storage_recovery.py",
  "storage_search.py",
  "storage_cleanup.py",
  "storage_manager.py",
  "supported_formats.py",
  "ui_state.py",
  "ui_common.py",
  "ui_home.py",
  "ui_labels.py",
  "ui_upload.py",
  "ui_review.py",
  "ui_execute.py",
  "ui_search.py",
  "ui_renderers.py",
  "ui_records.py",
  "version.py",
  "scripts/__init__.py",
  "scripts/check_workspace_clean.py",
  "scripts/create_release_zip.py",
  "scripts/create_demo_folder.py",
  "scripts/safe_compile.py",
  "scripts/safe_compileall.py",
  "scripts/validate_release_source.py",
  "scripts/verify_release_zip.py",
  "tests/conftest.py",
  "tests/test_pdf_image_video_fallbacks.py",
  "tests/test_report_exports.py",
  "tests/test_storage.py",
  "tests/test_storage_decision_history_schema.py",
  "tests/test_streamlit_smoke.py",
  "tests/test_ui_smoke_imports.py",
  "tests/test_utils.py",
]

[[tool.mypy.overrides]]
module = ["streamlit", "streamlit.*"]
follow_imports = "skip"
ignore_errors = true

[[tool.mypy.overrides]]
module = ["tests", "tests.*"]
check_untyped_defs = false
disallow_untyped_defs = false
warn_return_any = false

