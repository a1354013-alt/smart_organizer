name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Syntax check
        run: |
          python -c "from pathlib import Path; files = ['app.py','app_main.py','core.py','core_utils.py','core_classification.py','core_processor.py','services.py','services_models.py','services_analysis.py','services_review.py','services_finalize.py','async_processor.py','storage.py','storage_base.py','storage_schema.py','storage_repository.py','storage_recovery.py','storage_search.py','storage_cleanup.py','storage_manager.py','logging_config.py','version.py','contracts.py']; [compile(Path(f).read_text(encoding='utf-8'), f, 'exec') for f in files]"

      - name: Ruff (minimal)
        run: |
          ruff check .

      - name: Mypy (minimal)
        run: |
          mypy version.py contracts.py services.py services_models.py services_analysis.py services_review.py services_finalize.py core.py core_utils.py core_classification.py core_processor.py storage.py storage_base.py storage_schema.py storage_repository.py storage_recovery.py storage_search.py storage_cleanup.py storage_manager.py async_processor.py

      - name: Tests
        run: |
          python -B -m pytest -q --cov=. --cov-report=term-missing:skip-covered
