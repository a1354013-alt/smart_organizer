name: CI

on:
  push:
  pull_request:

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  dependency-lock-determinism:
    name: Dependency Lock Determinism
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.lock.txt
            requirements-dev.lock.txt

      - name: Install
        run: |
          python -B -m pip install --upgrade pip
          python -B -m pip install -r requirements-dev.lock.txt

      - name: Python runtime preflight
        run: python -B -c "from runtime_preflight import require_supported_python; require_supported_python()"

      - name: Static lock validation
        run: python -B scripts/validate_dependency_locks.py --mode static

      - name: Seeded no-upgrade regeneration
        run: python -B scripts/validate_dependency_locks.py --mode regenerate

      - name: Repository unchanged check
        run: git diff --exit-code

      - name: Cleanup generated workspace artifacts
        run: python -B scripts/cleanup_workspace.py

      - name: Workspace clean check
        run: python -B scripts/check_workspace_clean.py --project-root .

  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    needs: dependency-lock-determinism
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.lock.txt
            requirements-dev.lock.txt

      - name: Install ffmpeg
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install
        run: |
          python -B -m pip install --upgrade pip
          python -B -m pip install -r requirements-dev.lock.txt

      - name: Python runtime preflight
        run: python -B -c "from runtime_preflight import require_supported_python; require_supported_python()"

      - name: Clean release output
        shell: bash
        run: rm -rf release_ci coverage.xml test-results.xml resourcewarning-results.xml pytest-output.txt .coverage .coverage.*

      - name: Compile Python files
        run: python -B scripts/safe_compileall.py -q .

      - name: Validate dependency locks
        run: python -B scripts/validate_dependency_locks.py --mode static

      - name: Ruff
        run: python -B -m ruff check --no-cache .

      - name: Mypy
        run: python -B -m mypy --cache-dir=/dev/null

      - name: Pytest ResourceWarning gate
        run: |
          python -B -X tracemalloc=10 -W error::ResourceWarning -m pytest -q --tb=short -ra --junitxml=resourcewarning-results.xml tests/test_storage_db_schema.py tests/test_runtime_config.py tests/test_storage.py tests/test_app_bootstrap.py

      - name: Pytest with coverage
        run: python -B -m pytest -q --tb=short -ra --junitxml=test-results.xml --cov=. --cov-branch --cov-report=term-missing --cov-report=xml

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            coverage.xml
            test-results.xml
            resourcewarning-results.xml
          if-no-files-found: ignore

      - name: Cleanup validation artifacts
        if: always()
        run: python -B scripts/cleanup_validation_artifacts.py

      - name: Dependency audit
        run: python -B -m pip_audit -r requirements.lock.txt

      - name: Build release zip
        run: python -B scripts/create_release_zip.py --output-dir release_ci --zip-name smart_organizer-release-validation.zip

      - name: Verify release zip
        run: python -B scripts/verify_release_zip.py release_ci/smart_organizer-release-validation.zip

      - name: Validate release source command plan
        run: |
          python -B scripts/validate_release_source.py --dry-run

      - name: Validate release source execution
        run: |
          python -B scripts/validate_release_source.py --timeout-tail-lines 20

      - name: Cleanup generated workspace artifacts
        run: python -B scripts/cleanup_workspace.py

      - name: Workspace clean check
        run: python -B scripts/check_workspace_clean.py --project-root .

      - name: PowerShell syntax smoke
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw create_release_zip.ps1), [ref]$null)

      - name: Cleanup release output
        if: always()
        shell: bash
        run: rm -rf release_ci coverage.xml test-results.xml resourcewarning-results.xml pytest-output.txt .coverage .coverage.*
