name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Clean release output
        run: rm -rf release_ci

      - name: Compile Python files
        run: python scripts/safe_compileall.py -q .

      - name: Ruff
        run: python -m ruff check --no-cache .

      - name: Mypy
        run: python -m mypy --cache-dir=/dev/null

      - name: Pytest
        run: python -m pytest -q

      - name: Build release zip
        run: python scripts/create_release_zip.py --output-dir release_ci --zip-name smart_organizer-release-validation.zip

      - name: Verify release zip
        run: python scripts/verify_release_zip.py release_ci/smart_organizer-release-validation.zip

      - name: Workspace clean check
        run: python scripts/check_workspace_clean.py --project-root .

      - name: Validate release source command plan
        run: |
          python scripts/validate_release_source.py --dry-run

      - name: Validate release source execution
        run: |
          python scripts/validate_release_source.py --timeout-tail-lines 20

      - name: Cleanup release output
        if: always()
        run: rm -rf release_ci
